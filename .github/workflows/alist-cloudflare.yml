name: Run AList and Immich with Cloudflare Tunnel

on:
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 提前创建好本地挂载文件夹（防止权限冲突）
      - name: Prepare Local Directories
        run: |
          mkdir -p ./alist-data
          mkdir -p ./immich-upload
          mkdir -p ./immich-postgres

      # 2. 从 URL 下载加密的 JSON 备份文件，并利用临时容器【离线解密】（核心修复步骤）
      - name: Fetch and Offline Restore AList JSON Config
        env:
          CONFIG_URL: ${{ secrets.ALIST_CONFIG_URL }}
          BACKUP_PASS: ${{ secrets.ALIST_BACKUP_PASSWORD }}
          LOGIN_PASS: ${{ secrets.PASS }}
        run: |
          echo "正在从远程 URL 下载加密的 JSON 备份文件..."
          curl -L "$CONFIG_URL" -o ./backup.json
          
          if [ -s ./backup.json ]; then
            echo "备份文件下载成功，正在进行离线解密并导入到本地挂载目录..."
            
            # 关键改动：用一个临时的、用完即毁(--rm)的 AList 容器，直接把数据解密到物理磁盘的 ./alist-data/data.db 中
            docker run --rm \
              -v $(pwd)/alist-data:/opt/alist/data \
              -v $(pwd)/backup.json:/backup.json \
              xhofe/alist:latest /opt/alist/alist admin import /backup.json "$BACKUP_PASS"
            
            echo "等待数据库写入磁盘..."
            sleep 3
            
            if [ -f "./alist-data/data.db" ]; then
              echo "【成功】配置已完美恢复至本地数据库文件！"
              
              echo "正在强制将最终登录管理员密码同步为你设置的 PASS..."
              # 同理，在正式容器启动前，先把密码在数据库里改好，防止后续冲突
              docker run --rm \
                -v $(pwd)/alist-data:/opt/alist/data \
                xhofe/alist:latest /opt/alist/alist admin set "$LOGIN_PASS"
            else
              echo "【错误】AList 导入命令未能成功生成 data.db 文件，请检查备份密码是否正确。"
              exit 1
            fi
            
            # 清理宿主机的临时 json 文件
            rm -f ./backup.json
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi

      # 3. 创建整合了 AList 和 Immich 的 docker-compose.yml 配置文件
      - name: Create Docker Compose File
        run: |
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            # --- AList 服务（此时启动会直接读取在第 2 步就已经解密恢复好的完整数据库） ---
            alist:
              image: xhofe/alist:latest
              container_name: alist
              ports:
                - "5244:5244"
              volumes:
                - ./alist-data:/opt/alist/data
              environment:
                - PUID=0
                - PGID=0
                - UMASK=022
              restart: always

            # --- Immich 服务核心组 ---
            immich-server:
              container_name: immich_server
              image: ghcr.io/immich-app/immich-server:release
              volumes:
                - ./immich-upload:/usr/src/app/upload
                - /etc/localtime:/etc/localtime:ro
              env_file:
                - .env
              ports:
                - "2283:2283"
              depends_on:
                immich-postgres:
                  condition: service_healthy
                immich-redis:
                  condition: service_started
              restart: always

            immich-machine-learning:
              container_name: immich_machine_learning
              image: ghcr.io/immich-app/immich-machine-learning:release
              volumes:
                - ./immich-cache:/cache
              env_file:
                - .env
              restart: always

            immich-postgres:
              container_name: immich_postgres
              image: tensorchord/pgvecto-rs:pg14-v0.2.0
              environment:
                POSTGRES_PASSWORD: DB_PASSWORD_TEMPORARY
                POSTGRES_USER: postgres
                POSTGRES_DB: immich
              volumes:
                - ./immich-postgres:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -d immich -U postgres"]
                interval: 5s
                timeout: 5s
                retries: 5
              restart: always

            immich-redis:
              container_name: immich_redis
              image: redis:6.2-alpine
              restart: always

            # --- Cloudflare 穿透隧道（保持你原本能正常运行的配置不变） ---
            tunnel:
              image: cloudflare/cloudflared:latest
              container_name: cloudflared-tunnel
              restart: always
              command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
              network_mode: "host"
              depends_on:
                - alist
                - immich-server
          EOF

      # 4. 创建 Immich 专属的 .env 环境变量文件
      - name: Create Immich Env File
        run: |
          cat << 'EOF' > .env
          DB_PASSWORD=DB_PASSWORD_TEMPORARY
          DB_USERNAME=postgres
          DB_DATABASE_NAME=immich
          DB_HOSTNAME=immich-postgres
          IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
          EOF

      # 5. 正式启动所有 Docker 容器
      - name: Start Services and Cloudflare Tunnel
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          # 这样写可以确保即使没有显示 export，docker-compose 也能精准拿到这个 Token 变量
          CF_TUNNEL_TOKEN="${{ secrets.CF_TUNNEL_TOKEN }}" docker compose up -d
          
          echo "正在等待所有服务完成上线初始化..."
          sleep 15
          
          # 查看最终全套容器状态
          docker compose ps

      # 6. 保持工作流运行
      - name: Keep Workflow Alive
        run: |
          echo "=================================================="
          echo "【成功】AList 配置已 100% 成功恢复并投入运行！"
          echo "=================================================="
          while true; do sleep 60; done