name: Run AList and Immich with Cloudflare Tunnel

on:
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 创建整合了 AList 和 Immich 的 docker-compose.yml 配置文件
      - name: Create Docker Compose File
        run: |
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            # --- AList 服务 ---
            alist:
              image: xhofe/alist:latest
              container_name: alist
              ports:
                - "5244:5244"
              volumes:
                - ./alist-data:/opt/alist/data
              environment:
                - PUID=0
                - PGID=0
                - UMASK=022
              restart: always

            # --- Immich 服务核心组 ---
            immich-server:
              container_name: immich_server
              image: ghcr.io/immich-app/immich-server:release
              volumes:
                - ./immich-upload:/usr/src/app/upload
                - /etc/localtime:/etc/localtime:ro
              env_file:
                - .env
              ports:
                - "2283:2283"
              depends_on:
                - immich-postgres
                - immich-redis
              restart: always

            immich-machine-learning:
              container_name: immich_machine_learning
              image: ghcr.io/immich-app/immich-machine-learning:release
              volumes:
                - ./immich-cache:/cache
              env_file:
                - .env
              restart: always

            immich-postgres:
              container_name: immich_postgres
              # 使用 Immich 官方指定的专属 pgvecto-rs 镜像（支持人脸识别/机器学习向量）
              image: tensorchord/pgvecto-rs:pg14-v0.2.0
              environment:
                POSTGRES_PASSWORD: DB_PASSWORD_TEMPORARY
                POSTGRES_USER: postgres
                POSTGRES_DB: immich
              volumes:
                - ./immich-postgres:/var/lib/postgresql/data
              restart: always

            immich-redis:
              container_name: immich_redis
              # 使用官方纯净版 Redis
              image: redis:6.2-alpine
              restart: always

            # --- Cloudflare 穿透隧道 ---
            tunnel:
              image: cloudflare/cloudflared:latest
              container_name: cloudflared-tunnel
              restart: always
              # 使用 host 网络模式，方便一个隧道同时穿透本地 5244 (AList) 和 2283 (Immich)
              command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
              network_mode: "host"
              depends_on:
                - alist
                - immich-server
          EOF

      # 2. 创建 Immich 专属的 .env 环境变量文件
      - name: Create Immich Env File
        run: |
          cat << 'EOF' > .env
          # Immich 基础配置
          DB_PASSWORD=DB_PASSWORD_TEMPORARY
          DB_USERNAME=postgres
          DB_DATABASE_NAME=immich
          DB_HOSTNAME=immich-postgres
          
          # 绑定机器学习组件的位置
          IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
          EOF

      # 3. 启动所有服务
      - name: Start Services and Cloudflare Tunnel
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          PASS: ${{ secrets.PASS }}
        run: |
          # 后台启动所有容器
          docker compose up -d
          
          # 给多容器环境（尤其是数据库初始化）留出充足的启动时间
          echo "正在等待所有服务完成初始化..."
          sleep 20
          
          echo "========================================="
          echo "AList 初始登录管理员密码设置成功："
          docker exec alist ./alist admin set ${PASS}
          echo "========================================="
          
          # 检查并打印所有容器运行状态
          docker compose ps

      # 4. 保持工作流运行（防止虚拟机立即销毁）
      - name: Keep Workflow Alive
        run: |
          echo "=================================================="
          echo "AList 和 Immich 服务已全部在 GitHub Actions 上就绪！"
          echo "1. AList 外部访问地址: 你在 Cloudflare 绑定的 AList 域名"
          echo "2. Immich 外部访问地址: 你在 Cloudflare 绑定的 Immich 域名"
          echo "=================================================="
          echo "工作流保持运行中，最大运行时间为 6 小时。"
          echo "如需停止，请直接在 GitHub Actions 页面点击 'Cancel run'。"
          
          while true; do sleep 60; done