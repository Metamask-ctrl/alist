version: '3.8'
services:
  alist:
    image: xhofe/alist:latest
    container_name: alist
    ports:
      - "5244:5244"
    volumes:
      - ./alist-data:/opt/alist/data
      - /:/aaa
    environment:
      - PUID=0
      - PGID=0
      - UMASK=022
    restart: always


  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    network_mode: "host"
    depends_on:
      - alist
      
  lucky:
    image: gdy666/lucky:v2
    container_name: lucky
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lucky/icon.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:16601]"
    volumes:
      - /opt/1panel/apps/lucky/lucky:/app/conf
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    restart: always
    
    
    
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - /alist/immich:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false


  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:v2
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable

    restart: always
    healthcheck:
      disable: false


  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always


  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23

      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    #volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      #- ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false



  mariadb:
    container_name: mariadb
          
    image: mariadb:11.8.6
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    ports:
      - 127.0.0.1:3306:3306
    restart: always


  meilisearch:
    container_name: "1Panel-meilisearch-yQkf"

    image: getmeili/meilisearch:v1.44.0
    labels:
      createdBy: Apps

    restart: always


  photoprism:
    container_name: photoprism

    image: photoprism/photoprism:251130-ce
    labels:
      createdBy: Apps

    restart: always


  rustdesk:
    container_name: rustdesk

    image: rustdesk/rustdesk-server-s6:latest
    labels:
      createdBy: Apps

    restart: always

